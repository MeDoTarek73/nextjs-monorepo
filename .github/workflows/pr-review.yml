name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.validate.outputs.image-tag }}
      namespace: ${{ steps.validate.outputs.namespace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Validate branch → namespace
        id: validate
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ $BRANCH_NAME != feature/* ]]; then
            echo "❌ Not a feature branch"
            exit 1
          fi

          RAW_NAME=${BRANCH_NAME#feature/}
          NS=$(echo "$RAW_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-63)

          if ! [[ $NS =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "❌ Invalid DNS-compatible namespace: $NS"
            exit 1
          fi

          echo "Normalized namespace: $NS"
          IMAGE_TAG=$NS

          echo "namespace=$NS" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Set outputs for other steps
        id: set-outputs
        run: |
          echo "namespace=${{ steps.validate.outputs.namespace }}" >> $GITHUB_OUTPUT
          echo "image-tag=${{ steps.validate.outputs.image-tag }}" >> $GITHUB_OUTPUT
      - name: Build and push Frontend image
        run: |
          IMAGE_TAG=${{ steps.validate.outputs.image-tag }}
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_NAME:$IMAGE_TAG"

          echo "🛠️ Building Frontend image $IMAGE_NAME"
          docker build -t $IMAGE_NAME -f apps/nextjs-app/Dockerfile .
          docker push $IMAGE_NAME

  deploy-services:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config get-contexts

      - name: Prepare GHCR access
        run: |
          NS=${{ needs.build-frontend.outputs.namespace }}
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --docker-email=${{ github.actor }}@users.noreply.github.com \
            -n $NS \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n $NS \
            -p '{"imagePullSecrets": [{"name": "ghcr-secret"}]}'

      - name: Deploy Frontend Service + Wake-on-request sidecar
        run: |
          NS=${{ needs.build-frontend.outputs.namespace }}
          IMAGE_TAG=${{ needs.build-frontend.outputs.image-tag }}

          echo "🚀 Deploying/Updating Frontend Service with wake-on-request"
          sed 's/^          //' <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-application
            namespace: $NS
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend-application
            template:
              metadata:
                labels:
                  app: frontend-application
              spec:
                containers:
                  - name: frontend-application
                    image: ghcr.io/medotarek73/nextjs-monorepo:$IMAGE_TAG
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 3000
                    env:
                      - name: NODE_ENV
                        value: "production"
                      - name: API_URL
                        value: "http://backend-service:8080"
                  - name: wake-on-request
                    image: ghcr.io/medotarek73/wake-on-request:latest
                    env:
                      - name: TARGET_DEPLOYMENT
                        value: frontend-application
                      - name: TARGET_PORT
                        value: "3000"
                      - name: IDLE_TIMEOUT
                        value: "1800" # 30 min idle shutdown
                imagePullSecrets:
                  - name: ghcr-secret
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-application
            namespace: $NS
          spec:
            selector:
              app: frontend-application
            ports:
              - port: 3000
                targetPort: 3000
          EOF
          kubectl rollout restart deployment frontend-application -n $NS

      - name: Deploy Backend Service + Wake-on-request sidecar
        run: |
          NS=${{ needs.build-frontend.outputs.namespace }}
          IMAGE_TAG=${{ needs.build-frontend.outputs.image-tag }}

          echo "🚀 Deploying/Updating Backend Service with wake-on-request"
          sed 's/^          //' <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-service
            namespace: $NS
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend-service
            template:
              metadata:
                labels:
                  app: backend-service
              spec:
                containers:
                  - name: backend-service
                    image: ghcr.io/medotarek73/java-microservice-api:$IMAGE_TAG
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
                    env:
                      - name: QUARKUS_HTTP_HOST
                        value: "0.0.0.0"
                      - name: QUARKUS_HTTP_PORT
                        value: "8080"
                  - name: wake-on-request
                    image: ghcr.io/medotarek73/wake-on-request:latest
                    env:
                      - name: TARGET_DEPLOYMENT
                        value: backend-service
                      - name: TARGET_PORT
                        value: "8080"
                      - name: IDLE_TIMEOUT
                        value: "1800"
                imagePullSecrets:
                  - name: ghcr-secret
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: $NS
          spec:
            selector:
              app: backend-service
            ports:
              - port: 8080
                targetPort: 8080
          EOF
          kubectl rollout restart deployment backend-service -n $NS

      - name: Create/Update Ingress
        run: |
          NS=${{ needs.build-frontend.outputs.namespace }}
          HOST="$NS.semibots.com"
          sed 's/^          //' <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${NS}-ingress
            namespace: $NS
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-dns"
          spec:
            ingressClassName: traefik
            tls:
              - hosts:
                  - $HOST
                secretName: ${NS}-tls
            rules:
              - host: $HOST
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: frontend-application
                          port:
                            number: 3000
          EOF
  comment-on-pr:
    needs: [deploy-services, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Delete previous deployment comments
            for (const comment of comments) {
              if (comment.body.includes('🚀 Review App Launched')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            const namespace = '${{ needs.build-frontend.outputs.namespace }}';
            const imageTag = '${{ needs.build-frontend.outputs.image-tag }}';
            const frontendImage = `ghcr.io/medotarek73/nextjs-monorepo:${imageTag}`;
            const backendImage = `ghcr.io/medotarek73/java-microservice-api:${imageTag}`;
            const url = `https://${namespace}.semibots.com`;

            const commentBody = `## 🚀 Review App Launched

            **✅ PR Preview Environment Successfully Deployed!**

            ### 📦 Packages Deployed:
            - **Frontend Package:** \`${frontendImage}\`
            - **Backend Package:** \`${backendImage}\`

            ### 🌐 Review App Access:
            - **🔗 Live URL:** ${url}
            - **📁 Kubernetes Namespace:** \`${namespace}\`

            ### 📋 Deployment Information:
            - **👤 Triggered by:** ${{ github.actor }}
            - **🌿 Branch:** \`${{ github.head_ref }}\`
            - **📝 Commit:** \`${{ github.event.pull_request.head.sha }}\`
            - **⏰ Deployed at:** ${new Date().toISOString()}

            ---
            **🎉 Your review app is ready for testing!**`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

