name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      frontend-image-tag: ${{ steps.set-output.outputs.frontend-image-tag }}
      backend-image-tag: ${{ steps.set-output.outputs.backend-image-tag }}
      namespace: ${{ steps.set-output.outputs.namespace }}

    steps:
      - name: Check branch prefix
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ $BRANCH_NAME != feature/* ]]; then
            echo "❌ Not a feature branch ($BRANCH_NAME)"
            exit 0
          fi

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Image Tags
        id: tags
        run: |
          IMAGE_TAG=$(echo "${{ github.head_ref }}" | sed 's/^feature\///' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-63)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "namespace=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/nextjs-app/Dockerfile
          push: true
          tags: ghcr.io/medotarek73/nextjs-monorepo:${{ steps.tags.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build or select Backend image
        id: backend
        run: |
          IMAGE_NAME="ghcr.io/medotarek73/java-microservice-api:$IMAGE_TAG"
          if docker manifest inspect $IMAGE_NAME >/dev/null 2>&1; then
            echo "✅ Backend image for branch exists: $IMAGE_NAME"
          else
            echo "⚠️ Backend image not found for branch, using latest"
            IMAGE_NAME="ghcr.io/medotarek73/java-microservice-api:latest"
            IMAGE_TAG="latest"
          fi
          echo "🛠️ Using backend image $IMAGE_NAME"
          echo "backend-image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set outputs for deploy
        id: set-output
        run: |
          echo "frontend-image-tag=${{ steps.tags.outputs.namespace }}" >> $GITHUB_OUTPUT
          echo "backend-image-tag=${{ steps.backend.outputs.backend-image-tag }}" >> $GITHUB_OUTPUT
          echo "namespace=${{ steps.tags.outputs.namespace }}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
          echo "KUBECONFIG=${{ github.workspace }}/kubeconfig" >> $GITHUB_ENV

      - name: Prepare namespace and GHCR access
        run: |
          NS=${{ steps.tags.outputs.namespace }}
          kubectl create namespace $NS --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --docker-email=${{ github.actor }}@users.noreply.github.com \
            -n $NS --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n $NS \
            -p '{"imagePullSecrets": [{"name": "ghcr-secret"}]}'

      - name: Deploy Frontend Service
        env:
          NS: ${{ steps.tags.outputs.namespace }}
          IMAGE_TAG: ${{ steps.frontend.outputs.frontend-image-tag }}
        run: |
          echo "🚀 Deploying Frontend Service to namespace $NS with image tag $IMAGE_TAG"
          kubectl delete deployment frontend-application -n $NS --ignore-not-found=true
          kubectl delete pods -l app=frontend-application -n $NS --ignore-not-found=true
          envsubst < ./k8s/frontend-deployment.yaml | kubectl apply -f -
      - name: Deploy Backend Service
        env:
          NS: ${{ steps.tags.outputs.namespace }}
          IMAGE_TAG: ${{ steps.backend.outputs.backend-image-tag }}
        run: |
          echo "🚀 Deploying Backend Service to namespace $NS with image tag $IMAGE_TAG"
          kubectl delete deployment backend-service -n $NS --ignore-not-found=true
          envsubst < ./k8s/backend-deployment.yaml | kubectl apply -f -
      - name: Deploy Frontend Ingress
        env:
          NS: ${{ steps.tags.outputs.namespace }}
          HOST: ${{ steps.tags.outputs.namespace }}.semibots.com
        run: |
          echo "🌐 Creating ingress for $HOST in namespace $NS"
          envsubst < ./k8s/ingress.yaml | kubectl apply -f -

  comment-on-pr:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const frontendImage = `ghcr.io/medotarek73/nextjs-monorepo:${{ needs.build-and-deploy.outputs.frontend-image-tag }}`;
            const backendImage = `ghcr.io/medotarek73/java-microservice-api:${{ needs.build-and-deploy.outputs.backend-image-tag }}`;
            const namespace = '${{ needs.build-and-deploy.outputs.namespace }}';
            const url = `https://${namespace}.semibots.com`;

            const commentBody = `## 🚀 Review App Launched

            **✅ PR Preview Environment Successfully Deployed!**

            ### 📦 Packages Deployed:
            - **Frontend Package:** \`${frontendImage}\`
            - **Backend Package:** \`${backendImage}\`

            ### 🌐 Review App Access:
            - **🔗 Live URL:** ${url}
            - **📁 Kubernetes Namespace:** \`${namespace}\`

            ### 🔄 Package Status:
            - **Frontend:** ✅ Latest feature branch package deployed
            - **Backend:** ✅ Latest feature branch package deployed

            ### 📋 Deployment Information:
            - **👤 Triggered by:** ${{ github.actor }}
            - **🌿 Frontend Branch:** \`${{ github.head_ref }}\`
            - **🌿 Backend Branch:** \`${{ github.head_ref }}\`
            - **📝 Commit:** \`${{ github.event.pull_request.head.sha }}\`
            - **⏰ Deployed at:** ${new Date().toISOString()}

            ---
            **🎉 Your review app is ready for testing!**`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });
