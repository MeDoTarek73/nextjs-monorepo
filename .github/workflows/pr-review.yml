name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
    outputs:
      frontend-image-tag: ${{ steps.set-output.outputs.frontend-image-tag }}
      backend-image-tag: ${{ steps.set-output.outputs.backend-image-tag }}
      namespace: ${{ steps.set-output.outputs.namespace }}

    steps:
      - name: Check branch prefix
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ $BRANCH_NAME != feature/* ]]; then
            echo "❌ Not a feature branch ($BRANCH_NAME)"
            exit 0
          fi

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        id: build
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          IMAGE_TAG=$(echo "${BRANCH_NAME#feature/}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-63)

          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            IMAGE_NAME="ghcr.io/medotarek73/frontend-application:$IMAGE_TAG"
            echo "🛠️ Building frontend image $IMAGE_NAME"
            docker build -t $IMAGE_NAME -f ./apps/nextjs-app/Dockerfile .
            docker push $IMAGE_NAME
            echo "frontend-image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "namespace=$IMAGE_TAG" >> $GITHUB_OUTPUT

          else
            # Backend: check if image exists for this branch
            BACKEND_IMAGE="ghcr.io/medotarek73/backend-application:$IMAGE_TAG"
            if docker manifest inspect $BACKEND_IMAGE >/dev/null 2>&1; then
              echo "✅ Backend image for branch exists: $BACKEND_IMAGE"
            else
              echo "⚠️ Backend image for branch not found, using latest"
              IMAGE_TAG="latest"
              BACKEND_IMAGE="ghcr.io/medotarek73/backend-application:latest"
            fi

            echo "🛠️ Using backend image $BACKEND_IMAGE"
            echo "backend-image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          fi


      - name: Set output for other jobs
        id: set-output
        run: |
          echo "frontend-image-tag=${{ steps.build.outputs.frontend-image-tag }}" >> $GITHUB_OUTPUT
          echo "backend-image-tag=${{ steps.build.outputs.backend-image-tag }}" >> $GITHUB_OUTPUT
          echo "namespace=${{ steps.build.outputs.namespace }}" >> $GITHUB_OUTPUT

  deploy-services:
    needs: build-images
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Prepare namespace and GHCR access
        run: |
          NS=${{ needs.build-images.outputs.namespace }}

          kubectl create namespace $NS --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --docker-email=${{ github.actor }}@users.noreply.github.com \
            -n $NS --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n $NS \
            -p '{"imagePullSecrets": [{"name": "ghcr-secret"}]}'

      - name: Deploy Frontend
        run: |
          NS=${{ needs.build-images.outputs.namespace }}
          IMAGE_TAG=${{ needs.build-images.outputs.frontend-image-tag }}

          kubectl delete deployment frontend-application -n $NS --ignore-not-found=true
          kubectl delete pods -l app=frontend-application -n $NS --ignore-not-found=true

          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-application
            namespace: $NS
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend-application
            template:
              metadata:
                labels:
                  app: frontend-application
              spec:
                containers:
                - name: frontend-application
                  image: ghcr.io/medotarek73/frontend-application:$IMAGE_TAG
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 3000
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "128Mi"
                    limits:
                      cpu: "300m"
                      memory: "256Mi"
                  env:
                  - name: NODE_ENV
                    value: "production"
                  - name: API_URL
                    value: "http://backend-service:8080"
                - name: wake-on-request
                  image: ghcr.io/medotarek73/wake-on-request:latest
                  env:
                    - name: TARGET_DEPLOYMENT
                      value: frontend-application
                    - name: TARGET_PORT
                      value: "3000"
                    - name: IDLE_TIMEOUT
                      value: "1800"
                imagePullSecrets:
                - name: ghcr-secret
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-application
            namespace: $NS
          spec:
            selector:
              app: frontend-application
            ports:
            - port: 3000
              targetPort: 3000
          EOF

      - name: Deploy Backend
        run: |
          NS=${{ needs.build-images.outputs.namespace }}
          IMAGE_TAG=${{ needs.build-images.outputs.backend-image-tag }}

          kubectl delete deployment backend-service -n $NS --ignore-not-found=true

          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-service
            namespace: $NS
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend-service
            template:
              metadata:
                labels:
                  app: backend-service
              spec:
                containers:
                  - name: backend-service
                    image: ghcr.io/medotarek73/backend-application:$IMAGE_TAG
                    ports:
                      - containerPort: 8080
                    env:
                      - name: QUARKUS_HTTP_HOST
                        value: "0.0.0.0"
                      - name: QUARKUS_HTTP_PORT
                        value: "8080"
                    resources:
                      requests:
                        cpu: "500m"
                        memory: "512Mi"
                      limits:
                        cpu: "1"
                        memory: "1Gi"
                  - name: wake-on-request
                    image: ghcr.io/medotarek73/wake-on-request:latest
                    env:
                      - name: TARGET_DEPLOYMENT
                        value: backend-service
                      - name: TARGET_PORT
                        value: "8080"
                      - name: IDLE_TIMEOUT
                        value: "1800"
                imagePullSecrets:
                - name: ghcr-secret
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: $NS
          spec:
            selector:
              app: backend-service
            ports:
            - port: 8080
              targetPort: 8080
          EOF

      - name: Create Ingress
        run: |
          NS=${{ needs.build-images.outputs.namespace }}
          HOST="$NS.semibots.com"

          kubectl apply -f - <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${NS}-ingress
            namespace: $NS
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-dns"
          spec:
            ingressClassName: traefik
            tls:
            - hosts:
              - $HOST
              secretName: ${NS}-tls
            rules:
            - host: $HOST
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: frontend-application
                      port:
                        number: 3000
          EOF

  comment-on-pr:
    needs: [deploy-services, build-images]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const frontendImage = `ghcr.io/medotarek73/frontend-application:${{ needs.build-images.outputs.frontend-image-tag }}`;
            const backendImage = `ghcr.io/medotarek73/backend-application:${{ needs.build-images.outputs.backend-image-tag }}`;
            const namespace = '${{ needs.build-images.outputs.namespace }}';
            const url = `https://${namespace}.semibots.com`;

            const commentBody = `## 🚀 Review App Launched

            **✅ PR Preview Environment Successfully Deployed!**

            ### 📦 Packages Deployed:
            - **Frontend Package:** \`${frontendImage}\`
            - **Backend Package:** \`${backendImage}\`

            ### 🌐 Review App Access:
            - **🔗 Live URL:** ${url}
            - **📁 Kubernetes Namespace:** \`${namespace}\`

            ### 🔄 Package Status:
            - **Frontend:** ✅ Latest feature branch package deployed
            - **Backend:** ✅ Latest feature branch package deployed

            ### 📋 Deployment Information:
            - **👤 Triggered by:** ${{ github.actor }}
            - **🌿 Frontend Branch:** \`${{ github.head_ref }}\`
            - **🌿 Backend Branch:** \`${{ github.head_ref }}\`
            - **📝 Commit:** \`${{ github.event.pull_request.head.sha }}\`
            - **⏰ Deployed at:** ${new Date().toISOString()}

            ---
            **🎉 Your review app is ready for testing!**`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });
